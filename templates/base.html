<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}SaaS Boilerplate{% endblock %}</title>
    {% include "cdns.html" %}
    <script>
      (() => {
        const storageKey = "theme";
        const root = document.documentElement;
        const storedTheme = localStorage.getItem(storageKey);
        const systemTheme = window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light";
        const initialTheme = storedTheme === "dark" || storedTheme === "light" ? storedTheme : systemTheme;

        const applyTheme = (theme) => {
          root.setAttribute("data-theme", theme);
          localStorage.setItem(storageKey, theme);
          window.dispatchEvent(new CustomEvent("themechange", { detail: { theme } }));
        };

        window.appTheme = {
          get: () => root.getAttribute("data-theme") || initialTheme,
          set: applyTheme,
          toggle: () => applyTheme(root.getAttribute("data-theme") === "dark" ? "light" : "dark"),
        };

        root.setAttribute("data-theme", initialTheme);
      })();
    </script>
    <style>
        /* Softer semantic alerts for both light and dark themes */
        .alert-success {
            background-color: #f0fdf4;
            border-color: #bbf7d0;
            color: #14532d;
        }
        .alert-success i { color: #22c55e; }
        .alert-error {
            background-color: #fef2f2;
            border-color: #fecaca;
            color: #7f1d1d;
        }
        .alert-error i { color: #ef4444; }
        [data-theme="dark"] .alert-success {
            background-color: #0f1f14;
            border-color: #164e31;
            color: #dcfce7;
        }
        [data-theme="dark"] .alert-success i { color: #4ade80; }
        [data-theme="dark"] .alert-error {
            background-color: #1f0f10;
            border-color: #7f1d1d;
            color: #fee2e2;
        }
        [data-theme="dark"] .alert-error i { color: #f87171; }
    </style>
    {% block extra_head %}{% endblock %}
</head>
<body class="min-h-screen bg-base-200">
    {% block navbar %}{% include "components/navbar.html" %}{% endblock %}
    
    <main class="container mx-auto px-4 py-6">
        {% block content %}{% endblock %}
    </main>
    
    {% block footer %}{% endblock %}
    {% block extra_js %}{% endblock %}
</body>
</html>

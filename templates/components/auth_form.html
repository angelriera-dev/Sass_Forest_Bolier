<div class="min-h-[60vh] flex items-center justify-center py-16 px-8">
  <div class="w-full max-w-md space-y-8{% if centered %} transform -translate-y-10{% endif %}">
    {% if title %}
    <div class="text-center">
      <h2 class="text-3xl font-semibold tracking-tight">{{ title }}</h2>
      {% if subtitle %}<p class="mt-2 text-sm text-gray-500">{{ subtitle }}</p>{% endif %}
    </div>
    {% endif %}
    <form class="space-y-6" method="POST" action="{{ action }}">
      {% csrf_token %}
      {% if redirect_field_value %}
      <input type="hidden" name="{{ redirect_field_name }}" value="{{ redirect_field_value }}" />
      {% endif %}
      {{ form_content }}
      {% if form.errors %}{% include "components/error_block.html" %}{% endif %}
      {{ buttons }}
    </form>
    {% if footer %}<p class="text-sm text-center text-gray-500">{{ footer }}</p>{% endif %}
  </div>
</div>

<div class="bg-white border border-light-gray rounded">
    <div class="px-5 py-4 border-b border-light-gray">
        <h3 class="text-sm font-medium text-black">{{ title }}</h3>
    </div>
    <div class="p-4 space-y-2">
        {% for action in actions %}
        <a href="{{ action.url }}" {% if action.onclick %}onclick="{{ action.onclick }}"{% endif %} class="flex items-center gap-3 px-3 py-2.5 rounded hover:bg-[#fafafa] transition-colors group">
            <i class="fa-solid {{ action.icon }} text-gray text-xs w-4 text-center"></i>
            <span class="text-sm text-gray group-hover:text-black">{{ action.label }}</span>
        </a>
        {% endfor %}
    </div>
</div>

<div class="bg-white border border-light-gray rounded p-5">
    <div class="flex items-center justify-between">
        <p class="text-xs text-gray uppercase tracking-wider">{{ title }}</p>
        <div class="w-8 h-8 bg-[#fafafa] rounded flex items-center justify-center">
            <i class="fa-solid {{ icon }} text-gray text-xs"></i>
        </div>
    </div>
    <p class="mt-3 text-3xl font-medium text-black">{{ value }}</p>
    {% if link_url %}
    <a href="{% url link_url %}" class="mt-1 text-xs text-gray hover:text-black transition-colors">{{ subtitle }} &rarr;</a>
    {% else %}
    <p class="mt-1 text-xs text-gray">{{ subtitle }}</p>
    {% endif %}
</div>

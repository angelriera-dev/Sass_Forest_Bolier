{% load i18n %}
<div{% if not no_margin %} class="mt-6"{% endif %}>
  <label for="{{ id }}" class="block text-xs font-medium tracking-widest uppercase mb-1">{{ label }}</label>
  <input id="{{ id }}" name="{{ name|default:id }}" type="{{ type|default:'text' }}" 
         {% if required %}required{% endif %}
         {% if placeholder %}placeholder="{{ placeholder }}"{% endif %}
         {% if value %}value="{{ value }}"{% endif %}
         class="border-b-2 border-t-0 border-x-0 border-black p-3 w-full focus:border-dark-gray focus:outline-none">
</div>

[tool.ruff]
target-version = "py312"
line-length = 88
exclude = [
    "**/migrations/*",
]

[tool.ruff.lint]
# Rules: Style (E, W), Imports (I), Security (S), Bugbear (B), Upgrade (UP), Django (DJ)
select = ["E", "F", "W", "I", "S", "B", "UP", "DJ", "N", "RUF"]
ignore = [
    "S101", # Allow assert (needed for pytest)
    "DJ001", # Allow nullable string fields in models if preferred
    "F403", # Allow star imports in settings
    "F405", # Allow names from star imports
    "E402", # Allow module level imports not at top (for modular settings)
]

[tool.ruff.lint.per-file-ignores]
"src/config/settings/*.py" = ["F403", "F405"]

[tool.ruff.lint.isort]
known-first-party = ["apps", "config"]

[tool.ruff.lint.flake8-quotes]
docstring-quotes = "double"
inline-quotes = "single"

[tool.pyright]
include = ["src"]
exclude = ["**/migrations", "**/tests"]
typeCheckingMode = "strict"
reportMissingTypeStubs = false
pythonVersion = "3.12"
pythonPlatform = "Linux"

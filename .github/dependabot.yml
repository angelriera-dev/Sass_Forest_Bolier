# Dependabot Configuration for Django Fortress
# Strategy: Atomic Updates, Defensive Weekly Schedule, Supply Chain Hardening

version: 2

updates:
  # 1. PYTHON DEPENDENCIES
  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "weekly" # Defensive delay to mitigate day-zero supply chain attacks
      day: "monday"
    open-pull-requests-limit: 99 # No artificial limits
    labels:
      - "security"
      - "dependencies"
      - "python"
    ignore:
      - dependency-name: "python"
        versions: [">= 3.13"] # Stick to 3.12 for stability

  # 2. DOCKER INFRASTRUCTURE (Production)
  - package-ecosystem: "docker"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 99
    labels:
      - "security"
      - "infrastructure"
      - "docker"
    ignore:
      - dependency-name: "python"
        versions: [">= 3.13"]

  # 3. DOCKER INFRASTRUCTURE (Development)
  - package-ecosystem: "docker"
    directory: "/docker"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 99
    labels:
      - "security"
      - "infrastructure"
      - "docker"
    ignore:
      - dependency-name: "python"
        versions: [">= 3.13"]

  # 4. GITHUB ACTIONS
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 99
    labels:
      - "security"
      - "automation"
      - "github-actions"
